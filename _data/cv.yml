      - name: Multi Sensor Data Lakehouse 
        summary: High-Fidelity Time-Series Alignment & SQL Analytics for Robotics Telemetry
        highlights:
          - Current Ongoing Project
        start_date: 2026-07-08         
        end_date: Present

      - name: Sentinel Grid
        summary: End-to-end cyber defense data platform that captures real attacker activity with honeypots, analyzes behavior with ML, and turns it into real-time backend decisions and frontend threat visibility.
        highlights:
          - Built a full ML workflow for honeypot data - preprocessing, feature extraction, behavioral profiling, anomaly/clustering analysis with KMeans & Isolation Forest, and output generation.
          - Created a deployment recommendation engine that converts recent session behavior into normalized honeypot-type distributions for dynamic resource allocation.
          - Integrated ML into backend APIs so the system can serve current distributions, trigger on-demand pipeline refreshes, and support user entered configurations. 
        start_date: 2026-02-01         
        end_date: Present

      - name: Multimodal Survival Prediction for Muscle-Invasive Bladder Cancer (MIBC)
        summary: Medical Image Computing Research Project
        highlights:
          - Multimodal deep learning framework to predict patient survival by integrating whole-slide pathology image embeddings with clinical and treatment data.
          - Extracted pathology embeddings from foundation models including Prov-GigaPath, UNI, UNI2, and ResNet-18, and implemented attention-based multiple instance learning (MIL) architectures.
          - Engineered preprocessing pipelines for TCGA-BLCA data, including pathology patch extraction, clinical feature encoding, treatment representation, and train/validation/test dataset generation.
          - Designed a treatment-conditioned multimodal fusion model using PyTorch and optimized survival prediction with Cox proportional hazards loss and attention mechanisms.
          - Evaluated six survival prediction models using the concordance index (C-index), Kaplan-Meier analysis, and log-rank testing; achieved a 0.7385 C-index with the treatment-conditioned GigaPath model.
        start_date: 2026-01-20
        end_date: 2026-05-04




